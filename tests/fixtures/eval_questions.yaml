# Eval set for the Q&A Agent. Each question lists node ids that should appear
# in the cited or retrieved top evidence. These ids were resolved against the
# local Neo4j graph used during development.

- id: q1
  question: "How do I configure the Bash tool's permission mode?"
  expected_ids:
    - "https://code.claude.com/docs/en/agent-sdk/agent-loop.md#permission-mode"
    - "Tool:Bash"
    - "SettingKey:permissions"

